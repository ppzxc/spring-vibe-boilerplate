cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:*}

spring:
  application:
    name: ${APP_NAME:boilerplate-api}
  threads:
    virtual:
      enabled: true
  mvc:
    problemdetails:
      enabled: true
  lifecycle:
    timeout-per-shutdown-phase: ${SHUTDOWN_TIMEOUT:30s}
  datasource:
    url: ${DATASOURCE_URL:jdbc:postgresql://localhost:5432/boilerplate}
    driver-class-name: ${DATASOURCE_DRIVER:org.postgresql.Driver}
    username: ${DATASOURCE_USERNAME:boilerplate}
    password: ${DATASOURCE_PASSWORD}
    hikari:
      # Virtual Threads + HikariCP 권장 설정 (ADR-0025)
      # Virtual Thread는 blocking I/O 시 carrier thread를 반환하므로
      # 전통적인 "thread 수 = pool size" 공식이 맞지 않는다.
      # 권장: maximumPoolSize = DB 서버 max_connections × 0.8 이하
      # 시작값으로 20을 권장하며, 부하 테스트 후 조정한다.
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:20}
      minimum-idle: ${HIKARI_MIN_IDLE:5}
      connection-timeout: ${HIKARI_CONNECTION_TIMEOUT:30000}
      idle-timeout: ${HIKARI_IDLE_TIMEOUT:600000}
      max-lifetime: ${HIKARI_MAX_LIFETIME:1800000}
  flyway:
    locations: classpath:db/migration
  jooq:
    sql-dialect: ${JOOQ_DIALECT:POSTGRES}
  autoconfigure:
    exclude:
      - io.github.springwolf.core.configuration.SpringwolfAutoConfiguration
      - io.github.springwolf.plugins.stomp.configuration.SpringwolfStompAutoConfiguration
      - io.github.springwolf.bindings.stomp.configuration.SpringwolfStompBindingAutoConfiguration

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    io.github.ppzxc.boilerplate: ${LOG_LEVEL_APP:INFO}
  structured:
    format:
      console: logstash

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState, db
  otlp:
    tracing:
      endpoint: ${OTLP_ENDPOINT:}

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    path: /v3/api-docs
