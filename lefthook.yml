pre-commit:
  parallel: true
  commands:
    spotless:
      glob: "*.java"
      run: ./gradlew spotlessCheck --daemon -q
    checkstyle:
      glob: "*.java"
      run: ./gradlew checkstyleMain --daemon -q
    compile:
      glob: "*.java"
      run: ./gradlew compileJava --daemon -q

pre-push:
  commands:
    rewrite:
      run: ./gradlew rewriteDryRun --daemon -q
