type: specs.openrewrite.org/v1beta/recipe
name: io.github.ppzxc.boilerplate.CodeQuality
displayName: Boilerplate Code Quality
description: >
  Static analysis, Java best practices, and Spring Boot best practice recipes
  for the boilerplate hexagonal architecture project.
recipeList:
  # Static analysis
  - org.openrewrite.staticanalysis.CommonStaticAnalysis
  - org.openrewrite.staticanalysis.JavaApiBestPractices

  # Java 25 migration (includes Java 21 internally)
