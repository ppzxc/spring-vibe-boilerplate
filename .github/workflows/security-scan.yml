name: Security Scan

on:
  schedule:
    - cron: '0 9 * * 1'  # 매주 월요일 09:00 UTC
  workflow_dispatch: {}   # 수동 실행 지원

jobs:
  dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run OWASP Dependency Check
        run: ./gradlew dependencyCheckAnalyze --no-configuration-cache

      - name: Upload OWASP report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: owasp-report
          path: build/reports/dependency-check-report.*
          retention-days: 30

  sbom:
    name: CycloneDX SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Generate SBOM
        run: ./gradlew cyclonedxBom --no-configuration-cache

      - name: Upload SBOM
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: build/reports/bom.*
          retention-days: 90
