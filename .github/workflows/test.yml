name: Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  code-quality:
    name: Code Quality (Spotless, Checkstyle, OpenRewrite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run code quality checks
        run: ./gradlew spotlessCheck checkstyleMain

      - name: Run OpenRewrite dry run
        run: ./gradlew rewriteDryRun --no-configuration-cache

  unit-and-slice:
    name: Unit, Slice & Architecture Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run unit, slice & architecture tests
        run: >
          ./gradlew
          :boilerplate-domain:test
          :boilerplate-application:test
          :boilerplate-application-autoconfiguration:test
          :boilerplate-adapter-output-cache:test
          :boilerplate-adapter-output-external:test
          :boilerplate-adapter-input-ws:test
          :boilerplate-adapter-input-api:test

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: unit-test-results
          path: '**/build/test-results/test/*.xml'
          retention-days: 7

      - name: Upload JaCoCo reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: unit-jacoco
          path: '**/build/jacoco/test.exec'
          retention-days: 7
          if-no-files-found: ignore

  integration-test:
    name: Integration Tests (Docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run integration tests (Testcontainers)
        run: >
          ./gradlew
          :boilerplate-adapter-output-persist:test
          :boilerplate-boot-api:test

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: integration-test-results
          path: '**/build/test-results/test/*.xml'
          retention-days: 7

      - name: Upload JaCoCo reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: integration-jacoco
          path: '**/build/jacoco/test.exec'
          retention-days: 7
          if-no-files-found: ignore

  mutation-test:
    name: Mutation Tests (PIT)
    runs-on: ubuntu-latest
    continue-on-error: ${{ github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run mutation tests
        run: >
          ./gradlew
          :boilerplate-domain:pitest
          :boilerplate-application:pitest

      - name: Upload PIT reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: pitest-reports
          path: '**/build/reports/pitest/'
          retention-days: 7
          if-no-files-found: ignore

  coverage-report:
    name: Coverage Report
    needs: [unit-and-slice, integration-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: true

      - name: Download unit JaCoCo reports
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: unit-jacoco
          merge-multiple: true

      - name: Download integration JaCoCo reports
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: integration-jacoco
          merge-multiple: true

      - name: Generate aggregated coverage report
        run: ./gradlew testCodeCoverageReport

      - name: Verify coverage gate
        run: >
          ./gradlew
          :boilerplate-domain:jacocoTestCoverageVerification
          :boilerplate-application:jacocoTestCoverageVerification

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: build/reports/jacoco/testCodeCoverageReport/
          retention-days: 14
