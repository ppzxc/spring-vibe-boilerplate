name: Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  code-quality:
    name: Code Quality (Spotless, Checkstyle, OpenRewrite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run code quality checks
        run: >
          ./gradlew
          spotlessCheck
          checkstyleMain
          rewriteDryRun

  unit-and-slice:
    name: Unit, Slice & Architecture Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run unit, slice & architecture tests
        run: >
          ./gradlew
          :template-domain:test
          :template-application:test
          :template-application-autoconfiguration:test
          :template-adapter-output-cache:test
          :template-adapter-input-ws:test
          :template-adapter-input-api:test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: '**/build/test-results/test/*.xml'
          retention-days: 7

      - name: Upload JaCoCo reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-jacoco
          path: '**/build/jacoco/test.exec'
          retention-days: 7
          if-no-files-found: ignore

  integration-test:
    name: Integration Tests (Docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run integration tests (Testcontainers)
        run: >
          ./gradlew
          :template-adapter-output-persist:test
          :template-boot-api:test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: '**/build/test-results/test/*.xml'
          retention-days: 7

      - name: Upload JaCoCo reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-jacoco
          path: '**/build/jacoco/test.exec'
          retention-days: 7
          if-no-files-found: ignore

  coverage-report:
    name: Coverage Report
    needs: [unit-and-slice, integration-test]
    runs-on: ubuntu-latest
    # 템플릿 프로젝트이므로 커버리지 실패가 워크플로우를 차단하지 않도록 설정
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: true

      - name: Download unit JaCoCo reports
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: unit-jacoco
          merge-multiple: true

      - name: Download integration JaCoCo reports
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: integration-jacoco
          merge-multiple: true

      - name: Generate aggregated coverage report
        run: ./gradlew testCodeCoverageReport

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build/reports/jacoco/testCodeCoverageReport/
          retention-days: 14
