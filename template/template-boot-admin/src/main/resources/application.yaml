spring:
  application:
    name: template-admin
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:template}
    username: ${DB_USERNAME:template}
    password: ${DB_PASSWORD:template}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    default-property-inclusion: non_null
    datatype:
      datetime:
        write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:8081}
  shutdown: graceful

logging:
  structured:
    format:
      console: ecs
  level:
    root: INFO
    io.github.ppzxc.template: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

template:
  api:
    version: "2026-01-01"
  admin:
    allowed-ips: ${ADMIN_ALLOWED_IPS:127.0.0.1}
