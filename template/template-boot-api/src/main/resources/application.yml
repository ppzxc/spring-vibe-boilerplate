cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:*}

spring:
  application:
    name: ${APP_NAME:template-api}
  threads:
    virtual:
      enabled: true
  mvc:
    problemdetails:
      enabled: true
  lifecycle:
    timeout-per-shutdown-phase: ${SHUTDOWN_TIMEOUT:30s}
  datasource:
    url: ${DATASOURCE_URL:jdbc:postgresql://localhost:5432/template}
    driver-class-name: ${DATASOURCE_DRIVER:org.postgresql.Driver}
    username: ${DATASOURCE_USERNAME:template}
    password: ${DATASOURCE_PASSWORD}
  flyway:
    locations: classpath:db/migration
  jooq:
    sql-dialect: ${JOOQ_DIALECT:POSTGRES}
  autoconfigure:
    exclude:
      - io.github.springwolf.core.configuration.SpringwolfAutoConfiguration
      - io.github.springwolf.plugins.stomp.configuration.SpringwolfStompAutoConfiguration
      - io.github.springwolf.bindings.stomp.configuration.SpringwolfStompBindingAutoConfiguration

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    io.github.ppzxc.template: ${LOG_LEVEL_APP:INFO}
  structured:
    format:
      console: logstash

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: when-authorized
  otlp:
    tracing:
      endpoint: ${OTLP_ENDPOINT:}

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    path: /v3/api-docs
