spring:
  application:
    name: ${APP_NAME:template-api}
  threads:
    virtual:
      enabled: true
  mvc:
    problemdetails:
      enabled: true
  lifecycle:
    timeout-per-shutdown-phase: ${SHUTDOWN_TIMEOUT:30s}
  datasource:
    url: ${DATASOURCE_URL:jdbc:h2:mem:template;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE}
    driver-class-name: ${DATASOURCE_DRIVER:org.h2.Driver}
    username: ${DATASOURCE_USERNAME:sa}
    password: ${DATASOURCE_PASSWORD:}
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
  jooq:
    sql-dialect: ${JOOQ_DIALECT:H2}
  h2:
    console:
      enabled: false

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    io.github.ppzxc.template: ${LOG_LEVEL_APP:INFO}
  structured:
    format:
      console: logstash

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: when-authorized
  otlp:
    tracing:
      endpoint: ${OTLP_ENDPOINT:}

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    path: /v3/api-docs
