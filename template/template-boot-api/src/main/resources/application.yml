spring:
  application:
    name: ${APP_NAME:template-api}
  threads:
    virtual:
      enabled: true
  mvc:
    problemdetails:
      enabled: true

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    io.github.ppzxc.template: ${LOG_LEVEL_APP:INFO}
  structured:
    format:
      console: logstash

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: when-authorized
  otlp:
    tracing:
      endpoint: ${OTLP_ENDPOINT:}

server:
  port: ${SERVER_PORT:8080}

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    path: /v3/api-docs
